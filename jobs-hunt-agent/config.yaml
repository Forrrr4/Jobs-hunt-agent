# Job Hunt Agent 配置文件
# 修改此文件以匹配你的个人信息和求职偏好

user:
  name: "张三"
  email: "zhangsan@example.com"
  phone: "138xxxx1234"
  base_resume_path: "data/base_resume.md"

search:
  cities:
    - "北京"
    - "上海"
    - "深圳"
  industries:
    - "互联网"
    - "AI"
    - "软件开发"
  job_types:
    - "实习"
    - "全职"
  salary_min: 10000            # 元/月，低于此值的岗位跳过
  skills_required:             # 必须具备的技能（用于 LLM 评分）
    - "Python"
    - "LLM"
    - "Agent"
  skills_bonus:                # 加分技能（有则加分）
    - "LangChain"
    - "RAG"
    - "FastAPI"
  filter_score_threshold: 65   # 低于此分数不生成简历、不投递（0-100）

platforms:
  shixiseng:
    enabled: true
    cookie_file: ".cookies/shixiseng.json"
  boss:
    enabled: true
    cookie_file: ".cookies/boss.json"

limits:
  max_jobs_per_run: 50          # 单次运行最多抓取的职位数
  max_applications_per_day: 20  # 每日最多投递数（防止账号风控）
  request_delay_seconds:        # 页面操作间随机延迟范围（秒）
    - 2.0
    - 5.0

llm:
  model: "claude-sonnet-4-20250514"
  max_tokens: 2048
  temperature: 0.3
